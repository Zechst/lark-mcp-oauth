# Render Blueprint — Lark MCP remote OAuth server (Phase 1: validate on free tier)
#
# This deploys the patched fork as a remote, multi-user, per-user-OAuth MCP server,
# reachable from claude.ai (custom connector) and Claude Code (claude mcp add --transport http).
#
# NOTE ON FREE TIER: free web services have an EPHEMERAL filesystem (no persistent disk),
# so encrypted OAuth tokens survive only while the instance is alive — users re-auth after
# any redeploy/restart. This is fine for validating the OAuth flow. For durable tokens,
# upgrade to a paid plan, attach a disk, and set LARK_MCP_STORAGE_DIR (see DEPLOY.md, Phase 2).
services:
  - type: web
    name: lark-mcp-oauth
    runtime: node
    plan: free
    region: singapore # pick the region closest to your users / Lark tenant
    # dist/ is committed (see .gitignore note): Render's free builder OOMs running tsc over
    # the node-sdk type surface. --ignore-scripts skips the package's `prepare` (yarn build)
    # so we only install runtime deps and run the prebuilt output.
    buildCommand: yarn install --ignore-scripts
    # STATIC start command — never needs editing. Everything tunable (creds, domain, tools,
    # scope) is read from env vars by the CLI (cli.ts merges OAPI_MCP_ENV_ARGS): APP_ID,
    # APP_SECRET, LARK_DOMAIN, LARK_TOOLS, LARK_OAUTH_SCOPE. $PORT is injected by Render; bind
    # 0.0.0.0. To change which tools/scopes are exposed, edit the env vars below — no redeploy
    # of the command, just save the env var (which triggers a normal restart).
    # token-mode is omitted so it defaults to "auto": tenant_access_token (app
    # credentials, never expires) is used unless a tool explicitly requests the
    # user token. This avoids forcing the ~2h user_access_token onto every call
    # (which caused constant re-auth and broke tenant-only endpoints). To force a
    # mode, set the LARK_TOKEN_MODE env var (auto | tenant_access_token |
    # user_access_token) — do NOT re-add a --token-mode flag, as the CLI flag
    # overrides the env var.
    startCommand: >-
      node dist/cli.js mcp
      -m streamable --host 0.0.0.0 -p $PORT
      --oauth
    healthCheckPath: /health
    envVars:
      # The public HTTPS origin of THIS service. Must equal https://<name>.onrender.com
      # (or your custom domain). Drives the OAuth issuer/callback URLs — register
      # "<PUBLIC_BASE_URL>/callback" as the redirect URL in the Lark app console.
      - key: PUBLIC_BASE_URL
        sync: false
      # 64-char hex (32 bytes). Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: LARK_MCP_ENCRYPTION_KEY
        sync: false
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: LARK_DOMAIN
        value: https://open.larksuite.com
      # Which tools to expose. Presets (preset.doc.default), whole projects (sheets, mail,
      # calendar, im), or specific tool names — comma/space separated. Edit anytime.
      #   read presets:  preset.doc.default (doc/wiki read + import + share), calendar, im, mail
      #   WRITE presets: preset.doc.write   (edit/append/delete doc blocks; create/rename/move wiki nodes)
      #                  preset.base.full   (full Base CRUD incl. delete: apps/tables/fields/records, batch)
      #                  preset.drive.default (delete/move files & folders — also deletes docs/sheets/bases
      #                                        via drive.v1.file.delete — and manage sharing permissions)
      #                  preset.sheets.default (read, create, rename, find/replace + cell writes)
      #                  preset.base.views  (Grid/Kanban/Gantt/Gallery/Form views + dashboards)
      #                  preset.task.lists  (task lists, tasks, subtasks, members)
      #                  preset.doc.comments (create/read/resolve comments on any doc/file)
      #                  preset.board.default (read-only: list a whiteboard's nodes)
      # NOTE: wiki-node DELETE, board authoring, buttons, sync blocks and add-on widgets have no
      # generated/creatable API and are intentionally absent.
      - key: LARK_TOOLS
        value: preset.doc.default,preset.doc.write,preset.doc.comments,preset.base.full,preset.base.views,preset.calendar.default,preset.drive.default,preset.sheets.default,preset.task.lists,preset.board.default,im.v1.chat.list,im.v1.chat.search,im.v1.message.list,im.v1.message.get,im.v1.message.create,approval.v4.task.query,approval.v4.task.approve,approval.v4.task.reject,approval.v4.instance.create,approval.v4.instance.get,approval.v4.instance.list,approval.v4.instanceComment.create,approval.v4.instanceComment.list,mail.v1.userMailboxMessage.list,mail.v1.userMailboxMessage.get,mail.v1.userMailboxMessage.send
      # OAuth scopes granted to the user_access_token. Must cover the tools above. Comma/space
      # separated. Defaults to all app-granted permissions if left unset. The broad resource
      # scopes below (docx:document, bitable:app, drive:drive, wiki:wiki, sheets:spreadsheet)
      # already grant write+delete — but the Lark app itself must have those write/delete
      # permissions enabled in the developer console, or the calls 403 regardless of scope.
      - key: LARK_OAUTH_SCOPE
        value: docx:document,wiki:wiki,bitable:app,drive:drive,calendar:calendar,im:message,im:chat,sheets:spreadsheet,offline_access
